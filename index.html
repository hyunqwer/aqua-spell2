<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌊 아쿠아 스펠링 오디세이</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body,html{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Fredoka One','Comic Sans MS',sans-serif;touch-action:none;}
    #gameCanvas{display:block;width:100%;height:100%;cursor:none;}

    /* ── HUD ─────────────────────────────── */
    #hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;}

    .hud-top{
      position:absolute;top:0;left:0;right:0;
      padding:12px 16px;
      display:flex;justify-content:space-between;align-items:flex-start;
      background:linear-gradient(to bottom,rgba(0,15,50,.82) 0%,transparent 100%);
    }

    .hud-left{display:flex;flex-direction:column;gap:5px;}
    .hearts-row{display:flex;gap:3px;}
    .hrt{
      font-size:clamp(18px,4vw,28px);
      color:#ff3355; /* 하트 색상 강제 지정 */
      filter:drop-shadow(0 0 6px #ff3355);
      transition:transform .3s,filter .3s;
    }
    .hrt.lost{filter:grayscale(1) opacity(.35); color:#555;}
    .hrt.pop{animation:hrtPop .35s ease;}
    @keyframes hrtPop{0%{transform:scale(1)}50%{transform:scale(1.55)}100%{transform:scale(1)}}

    .score-row{
      font-size:clamp(15px,3.2vw,24px);color:#fff;
      text-shadow:0 0 12px rgba(80,200,255,.9);
      letter-spacing:1px;
    }
    .score-row .val{color:#ffd700;transition:all .15s;}

    .hud-center{
      position:absolute;top:12px;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:6px;
      text-align:center;min-width:200px;max-width:55vw;
    }
    .meaning-pill{
      background:rgba(255,215,0,.18);
      border:2px solid rgba(255,215,0,.55);
      backdrop-filter:blur(8px);
      border-radius:20px;padding:4px 18px;
      font-family:'Nunito',sans-serif;font-weight:700;
      font-size:clamp(12px,2.4vw,17px);color:#ffd700;
      text-shadow:0 0 10px rgba(255,215,0,.6);
      white-space:nowrap;
    }
    .word-main{
      font-family:'Fredoka One',sans-serif;
      font-size:clamp(26px,6.5vw,54px);
      color:#fff;letter-spacing:8px;
      text-shadow:0 0 18px rgba(100,200,255,1),0 0 36px rgba(100,200,255,.5);
      transition:all .3s;
    }
    .word-main.ok{
      color:#7fff7f;
      text-shadow:0 0 18px rgba(80,255,80,1),0 0 36px rgba(80,255,80,.5);
      animation:wordPop .45s ease;
    }
    @keyframes wordPop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

    .hud-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
    .level-chip{
      background:rgba(0,80,180,.45);
      border:1.5px solid rgba(100,200,255,.45);
      backdrop-filter:blur(8px);
      border-radius:10px;padding:4px 12px;
      font-size:clamp(11px,1.9vw,15px);color:#7dd9ff;
      white-space:nowrap;
    }
    .evo-label{font-size:clamp(9px,1.6vw,13px);color:rgba(255,255,255,.65);text-align:right;}
    .evo-dots{display:flex;gap:5px;}
    .evo-dot{
      width:clamp(9px,1.8vw,14px);height:clamp(9px,1.8vw,14px);
      border-radius:50%;border:2px solid rgba(100,200,255,.45);
      background:transparent;transition:all .4s cubic-bezier(.34,1.56,.64,1);
    }
    .evo-dot.on{background:#00d4ff;border-color:#00d4ff;box-shadow:0 0 8px #00d4ff;}

    #comboEl{
      position:absolute;top:50%;right:18px;transform:translateY(-50%);
      font-size:clamp(18px,4.5vw,36px);color:#ff8c00;
      text-shadow:0 0 14px #ff4500,0 0 28px #ff4500;
      opacity:0;transition:opacity .3s;text-align:right;
      line-height:1.3;
    }
    #comboEl.on{opacity:1;animation:comboPop .3s cubic-bezier(.34,1.56,.64,1);}
    @keyframes comboPop{from{transform:translateY(-50%) scale(.5)}to{transform:translateY(-50%) scale(1)}}

    #msgEl{
      position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
      font-size:clamp(18px,4.5vw,36px);white-space:nowrap;
      opacity:0;pointer-events:none;
    }
    #msgEl.pop{animation:msgAnim 2.4s ease forwards;}
    @keyframes msgAnim{
      0%{opacity:0;transform:translateX(-50%) translateY(18px)}
      18%{opacity:1;transform:translateX(-50%) translateY(0)}
      72%{opacity:1;transform:translateX(-50%) translateY(0)}
      100%{opacity:0;transform:translateX(-50%) translateY(-28px)}
    }

    #lvlUpEl{
      position:absolute;top:0;left:0;width:100%;height:100%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      pointer-events:none;opacity:0;transition:opacity .5s;
    }
    #lvlUpEl.show{opacity:1;}
    .lu-main{
      font-size:clamp(38px,9vw,72px);color:#ffd700;
      text-shadow:0 0 28px #ffd700,0 0 56px #ff8c00;
      animation:luAnim 2.5s ease forwards;
    }
    .lu-sub{
      font-size:clamp(20px,4.5vw,36px);color:#fff;
      animation:luAnim 2.5s ease .25s forwards;opacity:0;
    }
    @keyframes luAnim{
      0%{opacity:0;transform:scale(.5) translateY(28px)}
      28%{opacity:1;transform:scale(1.1) translateY(0)}
      68%{opacity:1;transform:scale(1) translateY(0)}
      100%{opacity:0;transform:scale(.85) translateY(-36px)}
    }

    #progressRow{
      position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
      display:flex;gap:5px;
    }
    .pdot{
      width:clamp(7px,1.3vw,11px);height:clamp(7px,1.3vw,11px);
      border-radius:50%;border:1.5px solid rgba(255,255,255,.38);
      background:transparent;transition:all .4s;
    }
    .pdot.done{background:#00d4ff;border-color:#00d4ff;box-shadow:0 0 6px #00d4ff;}
    .pdot.cur{background:#ffd700;border-color:#ffd700;box-shadow:0 0 6px #ffd700;animation:pdotPulse 1s infinite;}
    @keyframes pdotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}

    #overlayEl{
      position:absolute;top:0;left:0;width:100%;height:100%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,8,26,.88);backdrop-filter:blur(10px);
    }
    .ol-card{
      background:rgba(0,22,65,.72);
      border:2px solid rgba(100,200,255,.38);
      border-radius:24px;padding:clamp(22px,5vw,44px);
      max-width:min(92vw,480px);width:100%;text-align:center;
      backdrop-filter:blur(14px);
      box-shadow:0 0 44px rgba(0,90,255,.3),inset 0 0 40px rgba(0,40,130,.2);
    }
    #olTitle{
      font-size:clamp(26px,6.5vw,50px);color:#fff;
      text-shadow:0 0 18px rgba(100,200,255,.8);
      margin-bottom:14px;line-height:1.2;
    }
    #olDesc{
      font-family:'Nunito',sans-serif;
      font-size:clamp(12px,2.3vw,16px);color:rgba(200,230,255,.9);
      line-height:1.9;margin-bottom:22px;
    }
    .lv-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:7px;margin:14px 0;text-align:left;
    }
    .lv-item{
      background:rgba(0,40,120,.4);
      border:1px solid rgba(100,200,255,.28);
      border-radius:9px;padding:7px 11px;
      font-size:clamp(10px,1.9vw,13px);color:#7dd9ff;
    }
    #startBtn{
      font-family:'Fredoka One',sans-serif;
      font-size:clamp(16px,3.8vw,26px);
      background:linear-gradient(135deg,#0057e7 0%,#00c8ff 100%);
      color:#fff;border:none;border-radius:50px;
      padding:clamp(11px,2.4vw,17px) clamp(30px,5.5vw,52px);
      cursor:pointer;pointer-events:auto;
      box-shadow:0 4px 20px rgba(0,130,255,.5),0 0 40px rgba(0,90,255,.3);
      transition:transform .2s,box-shadow .2s;letter-spacing:1px;
    }
    #startBtn:hover{transform:scale(1.06);box-shadow:0 6px 30px rgba(0,150,255,.7);}
    #startBtn:active{transform:scale(.97);}

    #flashEl{
      position:absolute;top:0;left:0;width:100%;height:100%;
      pointer-events:none;opacity:0;transition:opacity .1s;
    }

    @keyframes shake{
      0%,100%{transform:translate(0,0)}
      10%{transform:translate(-8px,-3px)} 20%{transform:translate(8px,3px)}
      30%{transform:translate(-5px,5px)}  40%{transform:translate(5px,-5px)}
      50%{transform:translate(-3px,3px)}  60%{transform:translate(3px,-3px)}
      70%{transform:translate(-2px,2px)}  80%{transform:translate(2px,-2px)}
    }
    body.shake{animation:shake .5s ease;}

    .spop{
      position:absolute;font-family:'Fredoka One',sans-serif;
      font-size:clamp(16px,3.5vw,28px);pointer-events:none;
      animation:spopAnim 1.4s ease forwards;white-space:nowrap;
    }
    @keyframes spopAnim{
      0%{opacity:1;transform:translateY(0) scale(1)}
      100%{opacity:0;transform:translateY(-70px) scale(.7)}
    }

/* ══════════════════════════════════════════
   오디오 (Web Audio API)
══════════════════════════════════════════ */
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(type){
  try{
    const ac=getAC(), now=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    const conf={
      correct:{f:[523,659,784],dt:.1,dur:.45,vol:.28,shape:'sine'},
      wrong:  {f:[200,150],   dt:.15,dur:.32,vol:.28,shape:'sawtooth'},
      hit:    {f:[120],       dt:0,  dur:.3, vol:.38,shape:'sawtooth'},
      item:   {f:[880,1100],  dt:.1, dur:.3, vol:.2, shape:'sine'},
      combo:  {f:[900,1100],  dt:.06,dur:.22,vol:.22,shape:'square'},
      levelup:{f:[523,659,784,1047],dt:.15,dur:.5,vol:.28,shape:'sine'},
    }[type];
    if(!conf)return;
    o.type=conf.shape;
    conf.f.forEach((fr,i)=>o.frequency.setValueAtTime(fr,now+i*conf.dt));
    g.gain.setValueAtTime(conf.vol,now);
    g.gain.exponentialRampToValueAtTime(.001,now+conf.dur);
    o.start(now); o.stop(now+conf.dur);
    
    if(type==='levelup'){
      conf.f.forEach((fr,i)=>{
        const o2=ac.createOscillator(),g2=ac.createGain();
        o2.connect(g2);g2.connect(ac.destination);
        o2.frequency.value=fr;
        g2.gain.setValueAtTime(.28,now+i*.15);
        g2.gain.exponentialRampToValueAtTime(.001,now+i*.15+.45);
        o2.start(now+i*.15); o2.stop(now+i*.15+.5);
      });
    }
  }catch(e){}
}

/* ══════════════════════════════════════════
   그래픽 그리기 엔진 (이모지 의존성 완벽 제거)
══════════════════════════════════════════ */
function drawChar(ctx, type, size, state) {
  ctx.save();
  let color = '#fff', bodyL = 1, bodyW = 0.6, tailC = '#fff', hasStripe = false;
  let isEnemy = false;

  // 레벨 및 몬스터 타입별 형태 정의
  switch(type) {
    case 1: color='#ff7b00'; bodyL=0.8; bodyW=0.55; tailC='#ff7b00'; hasStripe=true; break; // 니모
    case 2: color='#2E8B57'; bodyL=0.7; bodyW=0.65; tailC='#1E5B37'; break; // 거북이
    case 3: color='#1e40af'; bodyL=1.1; bodyW=0.4; tailC='#1e3a8a'; break; // 청새치
    case 4: color='#0ea5e9'; bodyL=0.9; bodyW=0.5; tailC='#0284c7'; break; // 돌고래
    case 5: color='#171717'; bodyL=1.0; bodyW=0.55; tailC='#000'; hasStripe=true; break; // 범고래
    case 'shark': color='#475569'; bodyL=1.1; bodyW=0.5; tailC='#334155'; isEnemy=true; break;
    case 'squid': color='#be185d'; bodyL=0.7; bodyW=0.5; tailC='#9d174d'; isEnemy=true; break;
    case 'shrimp': color='#f97316'; bodyL=0.5; bodyW=0.3; tailC='#ea580c'; break; // 새우 펫
  }

  // 1. 꼬리 지느러미 (오징어는 촉수)
  ctx.fillStyle = tailC;
  ctx.beginPath();
  if (type === 'squid') {
    for(let i=-2; i<=2; i++) ctx.ellipse(-size*0.7, i*size*0.15, size*0.4, size*0.05, 0, 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.moveTo(-size * bodyL * 0.5, 0);
    ctx.lineTo(-size * bodyL * 1.3, -size * bodyW * 0.8);
    ctx.lineTo(-size * bodyL * 1.3, size * bodyW * 0.8);
    ctx.fill();
  }

  // 2. 상단 지느러미 (상어, 돌고래, 범고래)
  if (type === 4 || type === 5 || type === 'shark') {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(size*0.2, -size*bodyW*0.8);
    ctx.lineTo(-size*0.3, -size*bodyW*1.8);
    ctx.lineTo(-size*0.4, -size*bodyW*0.8);
    ctx.fill();
  }

  // 3. 몸통
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, 0, size * bodyL, size * bodyW, 0, 0, Math.PI*2);
  ctx.fill();

  // 4. 무늬 (니모 줄무늬, 범고래 얼룩)
  if (hasStripe) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(-size*bodyL*0.2, -size*bodyW*0.9, size*bodyL*0.3, size*bodyW*1.8);
    if(type === 5) { 
      ctx.beginPath(); ctx.ellipse(size*bodyL*0.5, -size*bodyW*0.3, size*0.2, size*0.1, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  // 5. 흰자위
  ctx.fillStyle = 'white';
  ctx.beginPath();
  let ex = size * bodyL * 0.5, ey = -size * bodyW * 0.3;
  ctx.arc(ex, ey, size * 0.18, 0, Math.PI*2);
  ctx.fill();

  // 6. 눈동자 & 표정 변화
  ctx.fillStyle = isEnemy ? '#ef4444' : 'black';
  if (state === 'dead') {
    ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(ex-4, ey-4); ctx.lineTo(ex+4, ey+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex+4, ey-4); ctx.lineTo(ex-4, ey+4); ctx.stroke();
  } else if (state === 'scared') {
    ctx.beginPath(); ctx.arc(ex, ey, size * 0.06, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#60a5fa'; ctx.beginPath(); ctx.arc(ex-10, ey-10, 4, 0, Math.PI*2); ctx.fill(); // 땀방울
  } else if (state === 'dizzy') {
    ctx.beginPath(); ctx.arc(ex, ey, size * 0.1, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='black'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(ex, ey, size*0.15, 0, Math.PI, true); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(ex + size*0.06, ey, size * 0.08, 0, Math.PI*2); ctx.fill(); // 정상 눈
  }

  // 7. 입 & 이빨
  if (!isEnemy && state !== 'dead') {
    ctx.strokeStyle = 'black'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (state === 'dizzy') ctx.arc(ex, ey + size*0.3, size*0.1, 0, Math.PI*2);
    else if (state === 'scared') ctx.arc(ex, ey + size*0.35, size*0.08, 0, Math.PI, true);
    else ctx.arc(ex, ey + size*0.25, size*0.1, 0.2, Math.PI*0.8); // 미소
    ctx.stroke();
  } else if (isEnemy) {
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.moveTo(ex, ey+size*0.3); ctx.lineTo(ex+size*0.2, ey+size*0.3); ctx.lineTo(ex+size*0.1, ey+size*0.4); ctx.fill();
  }
  ctx.restore();
}

// 아이템 전용 (별, 하트)
function drawStarItem(ctx, x, y, r, col) {
  ctx.save(); ctx.translate(x,y); ctx.fillStyle=col; ctx.beginPath();
  for(let i=0; i<5; i++){
    ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*r, -Math.sin((18+i*72)*Math.PI/180)*r);
    ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*(r*0.4), -Math.sin((54+i*72)*Math.PI/180)*(r*0.4));
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function drawHeartItem(ctx, x, y, size) {
  ctx.save(); ctx.translate(x,y); ctx.fillStyle='#ff99cc'; ctx.beginPath();
  ctx.arc(-size*.3, -size*.2, size*.3, 0, Math.PI*2);
  ctx.arc(size*.3, -size*.2, size*.3, 0, Math.PI*2);
  ctx.moveTo(-size*.58, -size*.1); ctx.lineTo(0, size*.6); ctx.lineTo(size*.58, -size*.1);
  ctx.fill(); ctx.restore();
}

/* ══════════════════════════════════════════
   게임 상태
══════════════════════════════════════════ */
let isPlaying=false, animID=null, frameN=0;
let ptr={x:400,y:300};
let wordList=[], curWord=null, wordsDone=0, combo=0;
let msgTO=null, lvlUpTO=null;

let pl={}, bubbles=[], preds=[], items=[], parts=[], spops=[], trail=[];
let bgBubs=[], rays=[], weeds=[], bgFish=[], stars=[];

/* ══════════════════════════════════════════
   이벤트
══════════════════════════════════════════ */
function movePtr(e){
  if(!isPlaying)return;
  if(e.touches&&e.touches.length){
    ptr.x=e.touches[0].clientX;
    ptr.y=e.touches[0].clientY-82;
  }else{ptr.x=e.clientX;ptr.y=e.clientY;}
  pl.tx=ptr.x; pl.ty=ptr.y;
}
canvas.addEventListener('mousemove',movePtr);
canvas.addEventListener('touchmove',e=>{e.preventDefault();movePtr(e);},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();movePtr(e);},{passive:false});
startBtn.addEventListener('click',startGame);

/* ══════════════════════════════════════════
   시작
══════════════════════════════════════════ */
function enterFS(){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}
function startGame(){
  enterFS(); getAC();
  overlayEl.style.display='none';
  hud.style.display='block';
  isPlaying=true; frameN=0; wordsDone=0; combo=0;

  pl={
    x:canvas.width/2, y:canvas.height/2,
    tx:canvas.width/2, ty:canvas.height/2,
    size:32, spd:0.07, spdMul:1,
    dir:1,
    hearts:3, score:0, level:1,
    invT:0, shieldT:0, inkT:0, wob:0,
  };

  wordList=[];
  for(let i=1;i<=5;i++){
    let sh=[...WORD_POOL[i]].sort(()=>Math.random()-.5);
    wordList=wordList.concat(sh.slice(0,5));
  }

  bubbles=[]; preds=[]; items=[]; parts=[]; spops=[]; trail=[];
  initBG();
  renderHearts(); renderEvo(); renderCombo(); renderProgress();
  setNextWord();
  if(animID)cancelAnimationFrame(animID);
  loop();
}

/* ══════════════════════════════════════════
   배경 초기화
══════════════════════════════════════════ */
function initBG(){
  bgBubs=[];
  for(let i=0;i<35;i++)bgBubs.push({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    r:Math.random()*7+2,spd:Math.random()*.5+.2,
    op:Math.random()*.25+.05,wob:Math.random()*Math.PI*2,
  });

  rays=[];
  for(let i=0;i<7;i++)rays.push({
    x:(i/6)*canvas.width+Math.random()*60-30,
    ang:Math.random()*.28-.14,
    w:Math.random()*55+28,
    op:Math.random()*.07+.02,
    spd:Math.random()*.001+.0004,
  });

  weeds=[];
  for(let i=0;i<9;i++)weeds.push({
    x:(i/8)*canvas.width+Math.random()*50-25,
    segs:Math.floor(Math.random()*5)+4,
    col:`hsl(${115+Math.random()*45},58%,32%)`,
    ph:Math.random()*Math.PI*2,
    h:Math.random()*75+55,
  });

  bgFish=[];
  for(let i=0;i<6;i++)bgFish.push({
    x:Math.random()*canvas.width,
    y:canvas.height*.12+Math.random()*canvas.height*.7,
    spd:(Math.random()*.55+.25)*(Math.random()<.5?1:-1),
    sz:Math.random()*10+8,
    op:.2+Math.random()*.3,
  });

  stars=[];
  for(let i=0;i<100;i++)stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.4+.4,
    ph:Math.random()*Math.PI*2,
  });
}

/* ══════════════════════════════════════════
   배경 그리기
══════════════════════════════════════════ */
function drawBG(){
  const lv=LEVELS[pl.level];
  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,lv.bgT); g.addColorStop(.5,lv.bgM); g.addColorStop(1,lv.bgB);
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);

  if(pl.level<=3){
    const fade=(4-pl.level)/3;
    rays.forEach(r=>{
      r.x+=Math.sin(frameN*r.spd)*.3;
      const rg=ctx.createLinearGradient(r.x,0,r.x,canvas.height*.75);
      rg.addColorStop(0,`rgba(255,255,255,${r.op*fade})`);
      rg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.save(); ctx.translate(r.x,0); ctx.rotate(r.ang);
      ctx.fillStyle=rg; ctx.fillRect(-r.w/2,0,r.w,canvas.height*.75);
      ctx.restore();
    });
  }

  if(pl.level<=2){
    weeds.forEach(w=>{
      ctx.beginPath();
      let sx=w.x, sy=canvas.height;
      ctx.moveTo(sx,sy);
      for(let s=0;s<w.segs;s++){
        const t=s/w.segs;
        const sway=Math.sin(frameN*.02+w.ph+t*2)*14;
        const nx=w.x+sway, ny=canvas.height-(s+1)*(w.h/w.segs);
        ctx.quadraticCurveTo(sx+sway*.5,(sy+ny)/2,nx,ny);
        sx=nx; sy=ny;
      }
      ctx.strokeStyle=w.col; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
    });
  }

  bgBubs.forEach(b=>{
    b.y-=b.spd; b.wob+=.03; b.x+=Math.sin(b.wob)*.28;
    if(b.y<-15){b.y=canvas.height+8;b.x=Math.random()*canvas.width;}
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${b.op})`; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.22,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${b.op*2})`; ctx.fill();
  });

  bgFish.forEach(f=>{
    f.x+=f.spd;
    if(f.x>canvas.width+55)f.x=-55;
    if(f.x<-55)f.x=canvas.width+55;
    ctx.save();
    ctx.globalAlpha=f.op;
    ctx.translate(f.x,f.y+Math.sin(frameN*.02+f.x*.01)*3);
    ctx.scale(f.spd>0?1:-1,1);
    // 배경 물고기도 직접 그리기
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(0, 0, f.sz, f.sz*0.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-f.sz*0.6, 0); ctx.lineTo(-f.sz*1.5, -f.sz*0.6); ctx.lineTo(-f.sz*1.5, f.sz*0.6); ctx.fill();
    ctx.restore();
  });

  if(pl.level>=4){
    const cnt=pl.level===5?90:45;
    stars.slice(0,cnt).forEach(s=>{
      const br=(Math.sin(frameN*.02+s.ph)+1)*.5;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${br*.38})`; ctx.fill();
    });
    if(pl.level===5){
      for(let i=0;i<8;i++){
        const bx=(i*137.5+frameN*.3)%canvas.width;
        const by=(i*97.3+frameN*.15)%canvas.height;
        const gfx=ctx.createRadialGradient(bx,by,0,bx,by,12);
        gfx.addColorStop(0,'rgba(0,255,180,.12)');
        gfx.addColorStop(1,'rgba(0,255,180,0)');
        ctx.fillStyle=gfx; ctx.beginPath(); ctx.arc(bx,by,12,0,Math.PI*2); ctx.fill();
      }
    }
  }

  const floor=ctx.createLinearGradient(0,canvas.height-90,0,canvas.height);
  floor.addColorStop(0,'rgba(0,0,0,0)'); floor.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=floor; ctx.fillRect(0,canvas.height-90,canvas.width,90);
}

    s.className='hrt'+(i>=pl.hearts?' lost':'');

  }

function showMsg(txt,color){
  if(msgTO)clearTimeout(msgTO);
  msgEl.innerText=txt; msgEl.style.color=color;

  const d=document.createElement('div');

}
function shake(){

  document.body.classList.add('shake');
  setTimeout(()=>document.body.classList.remove('shake'),520);
}
function vibe(pat){if(navigator.vibrate)try{navigator.vibrate(pat);}catch(e){}}

/* ══════════════════════════════════════════
   진화
══════════════════════════════════════════ */
function evolve(){
  pl.level++;
  const lv=LEVELS[Math.min(pl.level,5)];
  pl.spdMul=1+(pl.level-1)*.2;
  pl.size=30+(pl.level-1)*5;

  luMain.innerText=`LEVEL UP! Lv.${pl.level}`;

  if(lvlUpTO)clearTimeout(lvlUpTO);
  lvlUpTO=setTimeout(()=>lvlUpEl.classList.remove('show'),2600);

/* ══════════════════════════════════════════
   스포너
══════════════════════════════════════════ */
function spawnBubble(){
  if(!curWord)return;
  const ok=Math.random()<.38;
  let letter=curWord.missing;
  if(!ok){
    const A="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    do{letter=A[Math.floor(Math.random()*26)];}while(letter===curWord.missing);
  }
  bubbles.push({
    x:Math.random()*(canvas.width-90)+45,
    y:canvas.height+55,
    r:20+pl.level*2,
    letter,ok,
    spd:Math.random()*1.0+.85+pl.level*.22,
    wob:Math.random()*Math.PI*2,
    ph:Math.random()*Math.PI*2,
  });
}

function spawnPred(){
  const side=Math.random()<.5?-1:1;
  const sz=34+pl.level*9+Math.random()*11;
  preds.push({
    x:side===-1?-sz:canvas.width+sz,
    y:Math.random()*(canvas.height-130)+65,
    sz,
    type: pl.level>=3?'shark':(Math.random()<.6?'shark':'squid'), // 몬스터 종류 배정
    spd:(Math.random()*1.1+1.9+pl.level*.38)*-side,
    dir:side===-1?1:-1,
    trail:[],
  });
}

function spawnItem(){
  const type=Math.random()<.5?'heal':'shield';
  items.push({
    x:Math.random()*(canvas.width-90)+45,
    y:-55,sz:22,type,
    spd:Math.random()*1.1+.6,
    bob:Math.random()*Math.PI*2,
  });
}

function spawnParts(x,y,col,n=18){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2, s=Math.random()*5+2;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,sz:Math.random()*5+2});
  }
}

function collide(a,b,pad=0){
  const dx=a.x-b.x, dy=a.y-b.y;
  const aSize = a.sz !== undefined ? a.sz : a.size;
  const bSize = b.sz !== undefined ? b.sz : b.size;
  return Math.sqrt(dx*dx+dy*dy) < (aSize/2 + bSize/2 - pad);
}

/* ══════════════════════════════════════════
   게임 오버 / 클리어
══════════════════════════════════════════ */
function gameOver(){
  isPlaying=false; hud.style.display='none';
  cancelAnimationFrame(animID);
  beep('wrong'); shake();
  olTitle.innerHTML='💀 게임 오버';
  olDesc.innerHTML=`최종 점수: <strong style="color:#ffd700">${pl.score}</strong><br>완성한 단어: ${wordsDone}개 / ${wordList.length}개`;
  startBtn.innerText='🔄 다시 하기';
  overlayEl.style.display='flex';
}
function gameClear(){
  isPlaying=false; hud.style.display='none';
  cancelAnimationFrame(animID);
  beep('levelup');
  olTitle.innerHTML='🎉 게임 클리어!';
  olDesc.innerHTML=`바다의 제왕이 되었습니다!<br>최종 점수: <strong style="color:#ffd700">${pl.score}</strong>`;
  startBtn.innerText='🔄 다시 하기';
  overlayEl.style.display='flex';
}

/* ══════════════════════════════════════════
   메인 루프
══════════════════════════════════════════ */
function loop(){
  if(!isPlaying)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  frameN++;

  if(pl.invT>0)pl.invT--;
  if(pl.shieldT>0)pl.shieldT--;
  if(pl.inkT>0)pl.inkT--;

  drawBG();

  /* ─── 플레이어 이동 ─── */
  const spd=pl.spd*pl.spdMul*(pl.inkT>0?.42:1);
  pl.x+=(pl.tx-pl.x)*spd;
  pl.y+=(pl.ty-pl.y)*spd;
  pl.wob+=.08;
  if(pl.tx<pl.x-5)pl.dir=-1; else if(pl.tx>pl.x+5)pl.dir=1;

  /* ─── 플레이어 트레일 ─── */
  trail.unshift({x:pl.x,y:pl.y});
  if(trail.length>14)trail.pop();
  trail.forEach((pt,i)=>{
    const a=(1-i/trail.length)*.18;
    const r=pl.size*.4*(1-i/trail.length);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(80,200,255,${a})`; ctx.fill();
  });

  /* ─── 플레이어 그리기 (완벽 호환 그래픽 엔진) ─── */
  ctx.save();
  ctx.translate(pl.x, pl.y + Math.sin(pl.wob) * 2.2);
  ctx.scale(pl.dir, 1);

  let nearPred = preds.some(p => Math.hypot(pl.x - p.x, pl.y - p.y) < 160); 
  let pState = 'normal';
  if (pl.hearts <= 0) pState = 'dead';
  else if (pl.invT > 0 || pl.inkT > 0) pState = 'dizzy';
  else if (nearPred && pl.level < 5) pState = 'scared';

  if (pl.invT > 0 && Math.floor(frameN / 5) % 2 === 0) ctx.globalAlpha = 0.4;
  else if (pl.inkT > 0) ctx.globalAlpha = 0.6;

  if (pl.shieldT > 0) {
    const sa = .28 + Math.sin(frameN * .1) * .13;
    ctx.beginPath(); ctx.arc(0, 0, pl.size * .92, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(100,220,255,${sa})`; ctx.fill();
    ctx.strokeStyle = 'rgba(160,245,255,.82)'; ctx.lineWidth = 2.5; ctx.stroke();
  }

  // 이모지 대신 직접 만든 캐릭터 그리기 함수 호출!
  drawChar(ctx, pl.level, pl.size, pState);
  ctx.restore();

  /* ─── 콤보 펫 그리기 (직접 그리기 모드) ─── */
  if (combo >= 3 && trail.length > 6) {
    const p1 = trail[6];
    ctx.save(); ctx.translate(p1.x, p1.y + Math.sin(frameN * .1) * 3); ctx.scale(pl.dir, 1);
    drawChar(ctx, 'shrimp', pl.size*0.5, 'normal');
    ctx.restore();
  }
  
  if (combo >= 5 && trail.length > 12) {
    const p2 = trail[12];
    ctx.save(); ctx.translate(p2.x, p2.y + Math.sin(frameN * .1 + 1) * 3); ctx.scale(pl.dir, 1);
    drawStarItem(ctx, 0, 0, pl.size*0.4, '#ffd700');
    ctx.restore();
  }

  /* ─── 커스텀 커서 ─── */
  ctx.beginPath(); ctx.arc(ptr.x,ptr.y,5,0,Math.PI*2);
  ctx.fillStyle='rgba(100,200,255,.6)'; ctx.fill();
  ctx.beginPath(); ctx.arc(ptr.x,ptr.y,11,0,Math.PI*2);
  ctx.strokeStyle='rgba(100,200,255,.3)'; ctx.lineWidth=2; ctx.stroke();

  if(frameN%54===0)spawnBubble();
  if(frameN%Math.max(158-pl.level*27,65)===0)spawnPred();
  if(frameN%420===0)spawnItem();

  /* ─── 버블 및 🧲 자석 효과 ─── */
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];
    
    // 🔥 자석 효과 (초등학생 배려: 4콤보 이상이면 정답 버블이 알아서 끌려옵니다)
    if(combo >= 4 && b.ok) {
      const dx = pl.x - b.x, dy = pl.y - b.y;
      const dist = Math.hypot(dx, dy);
      if(dist < 320) {
        b.x += dx * 0.05; b.y += dy * 0.05;
        // 자석 연결선 이펙트
        ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(pl.x, pl.y);
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)'; ctx.lineWidth=2; ctx.stroke();
      } else {
        b.y -= b.spd; b.x += Math.sin(b.wob+frameN*.04)*1.4;
      }
    } else {
      b.y -= b.spd; b.x += Math.sin(b.wob+frameN*.04)*1.4;
    }
    
    b.ph+=.05;
    if(b.y<-65){bubbles.splice(i,1);continue;}

    const pulse=Math.sin(b.ph)*1.8, r=b.r+pulse;

    ctx.beginPath(); ctx.arc(b.x+2,b.y+2,r+2,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.14)'; ctx.fill();

    const bg2=ctx.createRadialGradient(b.x-r*.28,b.y-r*.28,r*.08,b.x,b.y,r);
    bg2.addColorStop(0,'rgba(255,255,255,.52)');
    bg2.addColorStop(.45,'rgba(140,210,255,.22)');
    bg2.addColorStop(1,'rgba(80,170,255,.08)');
    ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2);
    ctx.fillStyle=bg2; ctx.fill();

    ctx.strokeStyle='rgba(255,255,255,.72)'; ctx.lineWidth=1.5; ctx.stroke();

    ctx.beginPath(); ctx.arc(b.x-r*.32,b.y-r*.32,r*.18,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.58)'; ctx.fill();

    ctx.font=`bold ${r*1.12}px 'Fredoka One',Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,80,200,.8)'; ctx.shadowBlur=7;
    ctx.fillText(b.letter,b.x,b.y+1);
    ctx.shadowBlur=0;

    if(collide(pl,{x:b.x,y:b.y,sz:b.r*2},8)){
      if(b.ok){
        vibe([80]); combo++;
        const bon=Math.min(combo,5), earn=100*bon;
        pl.score+=earn;
        wordsDone++;
        spawnParts(b.x,b.y,'#ffd700',24);
        flash('rgba(80,255,80,.18)',.25);
        addSpop(b.x,b.y-30,`+${earn}`,combo>=3?'#ffa500':'#ffd700');
        wordEl.innerText=curWord.word;
        wordEl.className='word-main ok';
        const msgs=combo>=5?['🔥 LEGENDARY!','⚡ ON FIRE!']:
                   combo>=3?['🎯 AMAZING!','✨ FANTASTIC!']:
                            ['👍 Perfect!','⭐ Great!','💯 Excellent!'];
        showMsg(msgs[Math.floor(Math.random()*msgs.length)],combo>=3?'#ffa500':'#7fff7f');
        beep(combo>=3?'combo':'correct');
        renderEvo(); renderCombo();
        scoreVal.innerText=pl.score;
        if(wordsDone%5===0&&pl.level<5)evolve();
        setTimeout(setNextWord,1000);
      }else{
        vibe([55,40]); beep('wrong'); combo=0;
        pl.inkT=155;
        spawnParts(b.x,b.y,'#444',12);
        showMsg('💨 Oops! Combo Reset','#888');
        renderCombo();
      }
      bubbles.splice(i,1);
    }
  }

  /* ─── 포식자 ─── */
  for(let i=preds.length-1;i>=0;i--){
    const p=preds[i];
    p.x+=p.spd;
    p.trail.unshift({x:p.x,y:p.y});
    if(p.trail.length>7)p.trail.pop();

    p.trail.forEach((pt,ti)=>{
      const a=(1-ti/p.trail.length)*.14;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,p.sz*.28*(1-ti/p.trail.length),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,50,50,${a})`; ctx.fill();
    });

    ctx.save();
    ctx.translate(p.x,p.y+Math.sin(frameN*.04+i)*3);
    ctx.scale(p.dir,1);
    // 몬스터 직접 그리기 함수 호출
    drawChar(ctx, p.type, p.sz, 'normal');
    ctx.restore();

    const dx2=pl.x-p.x, dy2=pl.y-p.y;
    const dist=Math.sqrt(dx2*dx2+dy2*dy2);
    if(dist<160){
      const wa=(1-dist/160)*.55;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*.88,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,0,0,${wa*.18})`; ctx.fill();
      ctx.strokeStyle=`rgba(255,60,60,${wa})`; ctx.lineWidth=2; ctx.stroke();
    }

    if((p.dir===1&&p.x>canvas.width+130)||(p.dir===-1&&p.x<-130)){preds.splice(i,1);continue;}

    if(collide(pl,{x:p.x,y:p.y,sz:p.sz},11)){
      if(pl.level===5){
        vibe([100]); beep('correct'); pl.score+=80;
        spawnParts(p.x,p.y,'#ff4444',22);
        addSpop(p.x,p.y-30,'+80 YUM!','#ff6666');
        preds.splice(i,1); scoreVal.innerText=pl.score;
      }else if(pl.invT<=0&&pl.shieldT<=0){
        vibe([200,100,200]); beep('hit'); shake();
        flash('rgba(255,0,0,.28)',.35);
        combo=0; pl.hearts--; pl.invT=100;
        spawnParts(pl.x,pl.y,'#ff2222',22);
        renderHearts(); renderCombo();
        pl.tx+=(pl.x-p.x)*.22; pl.ty+=(pl.y-p.y)*.22;
        if(pl.hearts<=0){gameOver();return;}
      }else if(pl.shieldT>0){
        beep('correct');
        spawnParts(p.x,p.y,'#00d4ff',16);
        preds.splice(i,1);
      }
    }
  }

  /* ─── 아이템 ─── */
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.spd; it.bob+=.04;
    if(it.y>canvas.height+65){items.splice(i,1);continue;}

    // 아이템도 직접 그리기
    if (it.type === 'heal') drawHeartItem(ctx, it.x, it.y+Math.sin(it.bob)*5, it.sz*0.6);
    else drawStarItem(ctx, it.x, it.y+Math.sin(it.bob)*5, it.sz, '#ffd700');

    if(collide(pl,{x:it.x,y:it.y,sz:it.sz},0)){
      beep('item');
      if(it.type==='heal'&&pl.hearts<5){
        pl.hearts++;renderHearts();
        spawnParts(it.x,it.y,'#ff99cc',16);
        showMsg('💖 +1 Heart!','#ff99cc');
      }else if(it.type==='shield'){
        pl.shieldT=310;
        spawnParts(it.x,it.y,'#00d4ff',16);
        showMsg('🌟 Shield ON!','#00d4ff');
      }
      flash('rgba(255,255,200,.22)',.2);
      items.splice(i,1);
    }
  }

  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.14; p.life-=.034;
    if(p.life<=0){parts.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.fill();
    ctx.globalAlpha=1;
  }

  animID=requestAnimationFrame(loop);
}
</script>
</body>
